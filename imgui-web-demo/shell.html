    <title>ImGui Web Demo</title>

    <style>
        html, body {
            margin: 0;

            width: 100%;
            height: 100%;
            overflow: hidden;

        #canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            border: 0;
            outline: none;
            background: black;
            touch-action: none;
        }

</head>

    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script>
        var Module = {
            canvas: document.getElementById("canvas")
        };
