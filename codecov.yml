codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

ignore:
  - "lib/**/test/**"
  - "**/*Tests.cpp"
  - "build/**"
  - "build-coverage/**"
  - "**/CMakeFiles/**"
  - "**/_deps/**"
  - "standalone/**"
  - "**/examples/**"
  - "examples/**"
