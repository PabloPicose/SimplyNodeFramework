<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>SNFWidgets</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        #canvas {
            position: fixed !important;
            left: 0 !important;
            top: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            display: block !important;
            border: 0 !important;
            outline: none !important;
            background: #111;
            touch-action: none;
        }
    </style>
</head>

<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script>
        var Module = {
            canvas: document.getElementById("canvas")
        };
    </script>

    <script async type="text/javascript" src="index.js"></script>
</body>
</html>
