name: Debian 12

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Debug
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and test (Debian 12)
    runs-on: ubuntu-latest

    container:
      image: debian:12

    steps:
      - name: Install toolchain
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential git python3 python3-pip python3-venv ca-certificates \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl-dev pkg-config libsqlite3-dev
          python3 -m venv /opt/ci-venv
          /opt/ci-venv/bin/pip install --upgrade pip
          /opt/ci-venv/bin/pip install cmake ninja
          echo "/opt/ci-venv/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake --preset actions

      - name: Build
        run: cmake --build --preset actions

      - name: Test
        run: timeout 15m ctest --preset actions
