name: Debian 12

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Debug
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and test (Debian 12)
    runs-on: ubuntu-latest

    services:
      mysql-test:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    container:
      image: debian:12

    steps:
      - name: Install toolchain
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential git python3 python3-pip python3-venv ca-certificates \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl-dev pkg-config libsqlite3-dev default-mysql-client default-libmysqlclient-dev
          python3 -m venv /opt/ci-venv
          /opt/ci-venv/bin/pip install --upgrade pip
          /opt/ci-venv/bin/pip install cmake ninja
          echo "/opt/ci-venv/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake --preset actions

      - name: Build
        run: cmake --build --preset actions

      - name: Load MySQL schema
        run: |
          mysql -h mysql-test -P 3306 -uroot -proot --skip-ssl < lib/Database/test/mysql-schema.sql

      - name: Test
        env:
          SNF_MYSQL_HOST: mysql-test
          SNF_MYSQL_PORT: "3306"
          SNF_MYSQL_DATABASE: test_db
          SNF_MYSQL_USER: test_user
          SNF_MYSQL_PASSWORD: test_pass
        run: timeout 15m ctest --preset actions
