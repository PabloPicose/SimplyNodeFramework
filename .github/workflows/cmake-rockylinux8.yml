name: Rocky Linux 8

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Debug
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and test (Rocky Linux 8)
    runs-on: ubuntu-latest

    container:
      image: rockylinux:8

    steps:
      - name: Install toolchain
        run: |
          dnf -y install gcc gcc-c++ make git python3 python3-pip which findutils \
            wayland-devel wayland-protocols-devel libxkbcommon-devel \
            libX11-devel libXrandr-devel libXinerama-devel libXcursor-devel libXi-devel \
            mesa-libGL-devel pkgconf-pkg-config sqlite-devel
          python3 -m venv /opt/ci-venv
          /opt/ci-venv/bin/pip install --upgrade pip
          /opt/ci-venv/bin/pip install cmake ninja
          echo "/opt/ci-venv/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake --preset actions

      - name: Build
        run: cmake --build --preset actions

      - name: Test
        run: timeout 15m ctest --preset actions
