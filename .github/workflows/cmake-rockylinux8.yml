name: Rocky Linux 8

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Debug
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and test (Rocky Linux 8)
    runs-on: ubuntu-latest

    services:
      mysql-test:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    container:
      image: rockylinux:8

    steps:
      - name: Install toolchain
        run: |
          dnf install -y dnf-plugins-core
          dnf config-manager --set-enabled powertools
          dnf -y install gcc gcc-c++ make git python3 python3-pip which findutils \
            wayland-devel wayland-protocols-devel libxkbcommon-devel \
            libX11-devel libXrandr-devel libXinerama-devel libXcursor-devel libXi-devel \
            mesa-libGL-devel pkgconf-pkg-config sqlite-devel \
            mariadb mariadb-connector-c-devel
          python3 -m venv /opt/ci-venv
          /opt/ci-venv/bin/pip install --upgrade pip
          /opt/ci-venv/bin/pip install cmake ninja
          echo "/opt/ci-venv/bin" >> "$GITHUB_PATH"

      - name: Make mysqlclient pkg-config available
        run: |
          if ! pkg-config --exists mysqlclient 2>/dev/null; then
            for candidate in libmariadb mariadb; do
              if pkg-config --exists "$candidate" 2>/dev/null; then
                pc_file_dir="$(pkg-config --variable=pcfiledir "$candidate")"
                ln -sf "$pc_file_dir/$candidate.pc" "$pc_file_dir/mysqlclient.pc"
                break
              fi
            done
          fi
          # mariadb-connector-c-devel on RHEL/Rocky 8 does not ship a .pc file;
          # synthesise one so CMake's pkg_check_modules can locate the library.
          if ! pkg-config --exists mysqlclient 2>/dev/null && \
             ! pkg-config --exists libmariadb 2>/dev/null && \
             ! pkg-config --exists mariadb 2>/dev/null; then
            mkdir -p /usr/lib64/pkgconfig
            printf '%s\n' \
              'prefix=/usr' \
              'exec_prefix=${prefix}' \
              'libdir=${prefix}/lib64' \
              'includedir=${prefix}/include' \
              '' \
              'Name: libmariadb' \
              'Description: MariaDB Connector/C' \
              'Version: 3.0' \
              'Libs: -L${libdir} -lmariadb' \
              'Cflags: -I${includedir}/mariadb' \
              > /usr/lib64/pkgconfig/libmariadb.pc
          fi

      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake --preset actions

      - name: Build
        run: cmake --build --preset actions

      - name: Load MySQL schema
        run: |
          DB_CLIENT="$(command -v mysql || command -v mariadb)"
          "$DB_CLIENT" -h mysql-test -P 3306 -uroot -proot --skip-ssl < lib/Database/test/mysql-schema.sql

      - name: Test
        env:
          SNF_MYSQL_HOST: mysql-test
          SNF_MYSQL_PORT: "3306"
          SNF_MYSQL_DATABASE: test_db
          SNF_MYSQL_USER: test_user
          SNF_MYSQL_PASSWORD: test_pass
        run: timeout 15m ctest --preset actions
