# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Ubuntu (build and test)

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug
  # Opt into Node.js 24 for JavaScript-based GitHub Actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Ubuntu CI (tests + coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
          libgl-dev pkg-config cmake ninja-build libsqlite3-dev

    - name: Configure CMake
      run: cmake --preset actions-coverage

    - name: Build
      run: cmake --build --preset actions-coverage

    - name: Test
      run: |
        mkdir -p ${{github.workspace}}/coverage
        timeout 15m ctest --preset actions-coverage \
          --output-junit ${{github.workspace}}/coverage/junit.xml

    - name: Install gcovr
      run: python3 -m pip install --upgrade gcovr

    - name: Generate coverage reports
      working-directory: ${{github.workspace}}
      run: |
        mkdir -p coverage
        gcovr -r . build/actions-coverage \
          --filter 'lib/.*/src/' \
          --exclude 'lib/.*/test/' \
          --exclude 'lib/Widgets/' \
          --exclude 'standalone/' \
          --exclude 'build/actions-coverage/_deps/' \
          --xml-pretty -o coverage/coverage.xml

        gcovr -r . build/actions-coverage \
          --filter 'lib/.*/src/' \
          --exclude 'lib/.*/test/' \
          --exclude 'lib/Widgets/' \
          --exclude 'standalone/' \
          --exclude 'build/actions-coverage/_deps/' \
          --json-pretty -o coverage/coverage.json

        gcovr -r . build/actions-coverage \
          --filter 'lib/.*/src/' \
          --exclude 'lib/.*/test/' \
          --exclude 'lib/Widgets/' \
          --exclude 'standalone/' \
          --exclude 'build/actions-coverage/_deps/' \
          --txt > coverage/coverage.txt

    - name: Upload test results to Codecov
      if: ${{ !cancelled() && env.ACT != 'true' }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        report_type: test_results
        files: coverage/junit.xml
        flags: ubuntu-tests
        name: ubuntu-junit
        fail_ci_if_error: true
        verbose: true

    - name: Upload coverage to Codecov
      if: ${{ !cancelled() && env.ACT != 'true' }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage/coverage.xml
        flags: ubuntu
        name: ubuntu-gcovr
        fail_ci_if_error: true
        verbose: true

    - name: Coverage summary
      working-directory: ${{github.workspace}}
      run: |
        total_line=$(grep '^TOTAL' coverage/coverage.txt)
        core_line=$(grep 'lib/Core/src' coverage/coverage.txt | awk '{lines+=$2; exec+=$3} END {if (lines>0) printf "SNFCore %d %d %.2f%%", lines, exec, (100*exec/lines); else print "SNFCore 0 0 0.00%"}')
        net_line=$(grep 'lib/Network/src' coverage/coverage.txt | awk '{lines+=$2; exec+=$3} END {if (lines>0) printf "SNFNetwork %d %d %.2f%%", lines, exec, (100*exec/lines); else print "SNFNetwork 0 0 0.00%"}')

        echo "## Coverage (gcovr)" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "\`$total_line\`" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- $core_line" >> "$GITHUB_STEP_SUMMARY"
        echo "- $net_line" >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-ubuntu-gcovr
        path: |
          coverage/coverage.xml
          coverage/coverage.json
          coverage/coverage.txt
          coverage/junit.xml

