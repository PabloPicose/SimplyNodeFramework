# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Ubuntu (build and test)

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug
  # Opt into Node.js 24 for JavaScript-based GitHub Actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Ubuntu CI (tests + coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
          libgl-dev pkg-config cmake ninja-build libsqlite3-dev

    - name: Configure CMake
      run: cmake --preset actions

    - name: Build
      run: cmake --build --preset actions

    - name: Test
      run: timeout 15m ctest --preset actions

