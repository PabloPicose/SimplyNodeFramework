# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake Ubuntu (build and test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug
  # Opt into Node.js 24 for JavaScript-based GitHub Actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DSNF_ENABLE_TESTS=ON

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test Core
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}} -R SNFCoreTests --output-on-failure --timeout 180

    - name: Test Network
      working-directory: ${{github.workspace}}/build
      run: |
        ctest -C ${{env.BUILD_TYPE}} -R SNFNetworkTests --output-on-failure --timeout 180 || {
          echo "SNFNetworkTests failed. Re-running with verbose output..."
          ctest -C ${{env.BUILD_TYPE}} -R SNFNetworkTests -VV --output-on-failure --timeout 180
          exit 1
        }

  coverage:
    name: Ubuntu coverage (gcovr)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake (coverage)
      run: >
        cmake -B ${{github.workspace}}/build-coverage
        -DCMAKE_BUILD_TYPE=Debug
        -DSNF_ENABLE_TESTS=ON
        -DCMAKE_C_FLAGS='--coverage'
        -DCMAKE_CXX_FLAGS='--coverage'
        -DCMAKE_EXE_LINKER_FLAGS='--coverage'
        -DCMAKE_SHARED_LINKER_FLAGS='--coverage'

    - name: Build (coverage)
      run: cmake --build ${{github.workspace}}/build-coverage --config Debug

    - name: Test (coverage build)
      run: |
        mkdir -p ${{github.workspace}}/coverage
        ctest --test-dir ${{github.workspace}}/build-coverage --output-on-failure --timeout 180 \
          --output-junit ${{github.workspace}}/coverage/junit.xml

    - name: Install gcovr
      run: python3 -m pip install --upgrade gcovr

    - name: Generate coverage reports
      working-directory: ${{github.workspace}}
      run: |
        mkdir -p coverage
        gcovr -r . build-coverage \
          --filter 'lib/.*/src/' \
          --exclude 'lib/.*/test/' \
          --exclude 'build-coverage/_deps/' \
          --xml-pretty -o coverage/coverage.xml

        gcovr -r . build-coverage \
          --filter 'lib/.*/src/' \
          --exclude 'lib/.*/test/' \
          --exclude 'build-coverage/_deps/' \
          --json-pretty -o coverage/coverage.json

        gcovr -r . build-coverage \
          --filter 'lib/.*/src/' \
          --exclude 'lib/.*/test/' \
          --exclude 'build-coverage/_deps/' \
          --txt > coverage/coverage.txt

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage/coverage.xml,coverage/junit.xml
        flags: ubuntu
        name: ubuntu-gcovr
        fail_ci_if_error: true
        verbose: true

    - name: Coverage summary
      working-directory: ${{github.workspace}}
      run: |
        total_line=$(grep '^TOTAL' coverage/coverage.txt)
        core_line=$(grep 'lib/Core/src' coverage/coverage.txt | awk '{lines+=$2; exec+=$3} END {if (lines>0) printf "SNFCore %d %d %.2f%%", lines, exec, (100*exec/lines); else print "SNFCore 0 0 0.00%"}')
        net_line=$(grep 'lib/Network/src' coverage/coverage.txt | awk '{lines+=$2; exec+=$3} END {if (lines>0) printf "SNFNetwork %d %d %.2f%%", lines, exec, (100*exec/lines); else print "SNFNetwork 0 0 0.00%"}')

        echo "## Coverage (gcovr)" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "\`$total_line\`" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- $core_line" >> "$GITHUB_STEP_SUMMARY"
        echo "- $net_line" >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-ubuntu-gcovr
        path: |
          coverage/coverage.xml
          coverage/coverage.json
          coverage/coverage.txt
          coverage/junit.xml

