# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Ubuntu (build and test)

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug
  # Opt into Node.js 24 for JavaScript-based GitHub Actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Ubuntu CI (tests + coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      mysql-test:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
          libgl-dev pkg-config cmake ninja-build libsqlite3-dev \
          default-mysql-client default-libmysqlclient-dev

    - name: Configure CMake
      run: cmake --preset actions

    - name: Build
      run: cmake --build --preset actions

    - name: Load MySQL schema
      run: |
        mysql -h 127.0.0.1 -P 3307 -uroot -proot < lib/Database/test/mysql-schema.sql

    - name: Test
      env:
        SNF_MYSQL_HOST: 127.0.0.1
        SNF_MYSQL_PORT: "3307"
        SNF_MYSQL_DATABASE: test_db
        SNF_MYSQL_USER: test_user
        SNF_MYSQL_PASSWORD: test_pass
      run: timeout 15m ctest --preset actions

